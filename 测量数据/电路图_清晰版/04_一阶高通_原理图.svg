<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
.bg{fill:#fbfbf7}.title{font:700 42px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#111827}.sub{font:24px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#475467}.label{font:24px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#111827}.small{font:20px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#344054}.tiny{font:17px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#667085}.wire{stroke:#111827;stroke-width:4;stroke-linecap:round;fill:none}.cap{stroke:#111827;stroke-width:4;stroke-linecap:round}.res{fill:#fff7d6;stroke:#111827;stroke-width:4}.op{fill:#eef6ff;stroke:#111827;stroke-width:4}.node{fill:#111827}.panel{fill:#fff;stroke:#d0d5dd;stroke-width:2}.railp{stroke:#e11d48;stroke-width:5}.railg{stroke:#2563eb;stroke-width:5}.hole{fill:#d0d5dd}.chip{fill:#222;stroke:#000;stroke-width:2}.chiptext{font:700 20px Arial,sans-serif;fill:#fff}.wireRed{stroke:#e11d48;stroke-width:5;fill:none;stroke-linecap:round}.wireBlue{stroke:#2563eb;stroke-width:5;fill:none;stroke-linecap:round}.wireYellow{stroke:#d97706;stroke-width:5;fill:none;stroke-linecap:round}.wireGreen{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round}.capbody{fill:#fbbf24;stroke:#92400e;stroke-width:2}.resbody{fill:#f5deb3;stroke:#92400e;stroke-width:2}.stage{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:8 6}
</style>
<rect class="bg" width="100%" height="100%"/>
<text class="title" x="700" y="62" text-anchor="middle">一阶高通 原理图</text>
<text class="sub" x="700" y="102" text-anchor="middle">适合 STM32 测量：C=10nF 串联，R=10kΩ 对地，截止/中心频率 1.59kHz</text>
<rect class="panel" x="70" y="140" width="1260" height="650" rx="14"/>
<text class="label" x="105" y="335" text-anchor="start">Vin</text>
<text class="label" x="1250" y="335" text-anchor="start">Vout</text>
<line class="wire" x1="140" y1="330" x2="180" y2="330"/>
<rect class="stage" x="172" y="210" width="300" height="260" rx="10"/>
<text class="small" x="320" y="235" text-anchor="middle">第1级高通</text>
<line class="wire" x1="180" y1="330" x2="229.5" y2="330"/>
<line class="wire" x1="265.5" y1="330" x2="315" y2="330"/>
<line class="cap" x1="229.5" y1="298" x2="229.5" y2="362"/>
<line class="cap" x1="265.5" y1="298" x2="265.5" y2="362"/>
<text class="small" x="247.5" y="288" text-anchor="middle">10nF</text>
<circle class="node" cx="315" cy="330" r="5"/>
<line class="wire" x1="315" y1="330" x2="315" y2="354"/>
<line class="wire" x1="315" y1="411" x2="315" y2="435"/>
<rect class="res" x="301" y="354" width="28" height="57" rx="3"/>
<text class="small" x="361" y="382.5" text-anchor="start">10kΩ</text>
<line class="wire" x1="315" y1="435" x2="315" y2="453"/>
<line class="wire" x1="289" y1="453" x2="341" y2="453"/>
<line class="wire" x1="297" y1="463" x2="333" y2="463"/>
<line class="wire" x1="306" y1="473" x2="324" y2="473"/>
<line class="wire" x1="315" y1="330" x2="375" y2="330"/>
<polygon class="op" points="375,268 375,392 505,330"/>
<text class="label" x="389" y="308" text-anchor="middle">+</text>
<text class="label" x="389" y="366" text-anchor="middle">−</text>
<text class="small" x="437" y="337" text-anchor="middle">LM358</text>
<line class="wire" x1="505" y1="330" x2="545" y2="330"/>
<circle class="node" cx="545" cy="330" r="5"/>
<line class="wire" x1="375" y1="330" x2="375" y2="302"/>
<line class="wire" x1="545" y1="330" x2="545" y2="418"/>
<line class="wire" x1="545" y1="418" x2="375" y2="418"/>
<line class="wire" x1="375" y1="418" x2="375" y2="364"/>
<line class="wire" x1="570" y1="330" x2="1220" y2="330"/>
<text class="sub" x="700" y="835" text-anchor="middle">提示：LM358 8脚接 +5V，4脚接 GND；STM32 ADC 输入建议把交流信号偏置到约 1.65V，避免负半周被削掉。</text>
</svg>