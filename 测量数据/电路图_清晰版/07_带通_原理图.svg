<rect class="stage" x="622" y="210" width="430" height="260" rx="10"/>
<text class="small" x="837" y="235" text-anchor="middle">低通段 fH≈15.9kHz</text>
<line class="wire" x1="642" y1="330" x2="670" y2="330"/>
<line class="wire" x1="764" y1="330" x2="792" y2="330"/>
<rect class="res" x="670" y="316" width="94" height="28" rx="3"/>
<text class="small" x="717" y="304" text-anchor="middle">10kΩ</text>
<circle class="node" cx="792" cy="330" r="5"/>
<line class="wire" x1="792" y1="330" x2="792" y2="358"/>
<line class="cap" x1="765" y1="358" x2="819" y2="358"/>
<line class="cap" x1="765" y1="374" x2="819" y2="374"/>
<line class="wire" x1="792" y1="374" x2="792" y2="402"/>
<line class="wire" x1="792" y1="402" x2="792" y2="420"/>
<line class="wire" x1="766" y1="420" x2="818" y2="420"/>
<line class="wire" x1="774" y1="430" x2="810" y2="430"/>
<line class="wire" x1="783" y1="440" x2="801" y2="440"/>
<text class="small" x="838" y="375" text-anchor="start">1nF</text>
<line class="wire" x1="792" y1="330" x2="864" y2="330"/>
<polygon class="op" points="864,268 864,392 994,330"/>
<text class="label" x="878" y="308" text-anchor="middle">+</text>
<text class="label" x="878" y="366" text-anchor="middle">−</text>
<text class="small" x="926" y="337" text-anchor="middle">LM358</text>
<line class="wire" x1="994" y1="330" x2="1034" y2="330"/>
<circle class="node" cx="1034" cy="330" r="5"/>
<line class="wire" x1="864" y1="330" x2="864" y2="302"/>
<line class="wire" x1="1034" y1="330" x2="1034" y2="418"/>
<line class="wire" x1="1034" y1="418" x2="864" y2="418"/>
<line class="wire" x1="864" y1="418" x2="864" y2="364"/>
<line class="wire" x1="1074" y1="330" x2="1220" y2="330"/>
<text class="sub" x="700" y="835" text-anchor="middle">提示：LM358 8脚接 +5V，4脚接 GND；STM32 ADC 输入建议把交流信号偏置到约 1.65V，避免负半周被削掉。</text>
</svg>